
<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seranking</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-purple: #b807db;
        --deep-purple: #0ee4c7;
        --bg-dark: #0a0514;
        --border: rgba(157, 80, 187, 0.25);
      }

      body {
        margin: 0;
        padding: 0;
        background: var(--bg-dark);
        background-image: radial-gradient(
          circle at 50% -20%,
          #2e1065 0%,
          var(--bg-dark) 80%
        );
        font-family: "Inter", sans-serif;
        color: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .minimal-panel {
        width: 100%;
        max-width: 550px;
        background: rgba(15, 10, 25, 0.75);
        backdrop-filter: blur(25px);
        padding: 40px;
        border-radius: 30px;
        border: 1px solid var(--border);
        box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
      }

      h1 {
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 6px;
        margin: 0 0 35px 0;
        text-align: center;
        color: #fff;
        text-transform: uppercase;
        opacity: 0.8;
      }

      .tabs {
        display: flex;
        gap: 8px;
        background: rgba(0, 0, 0, 0.4);
        padding: 4px;
        border-radius: 16px;
        margin-bottom: 30px;
      }

      .tab-btn {
        flex: 1;
        padding: 10px;
        border: none;
        background: transparent;
        color: #64748b;
        font-weight: 600;
        font-size: 10px;
        cursor: pointer;
        border-radius: 12px;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .tab-btn.active {
        background: var(--primary-purple);
        color: #fff;
      }

      /* --- CSS UNTUK SEJAJAR (INLINE FORM) --- */
      .form-row {
        display: flex;
        align-items: center; /* Label & Input sejajar vertikal */
        gap: 20px; /* Jarak antara label & input */
        margin-bottom: 20px;
      }

      .input-label {
        flex: 0 0 100px; /* Lebar label tetap agar input sejajar lurus */
        font-size: 10px;
        color: var(--primary-purple);
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .input-field {
        flex: 1; /* Input mengambil sisa ruang */
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 16px;
        color: #fff;
        font-size: 13px;
        outline: none;
        transition: 0.3s;
      }

      .input-field:focus {
        border-color: var(--primary-purple);
        background: rgb(157, 80, 187);
      }

      /* --- BULK DYNAMIC FORM --- */
      #bulkFormContainer {
        margin: 10px 0 20px 120px; /* Menyesuaikan agar sejajar dengan input atas */
        max-height: 200px;
        overflow-y: auto;
      }

      .bulk-input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 8px;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .bulk-item {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(157, 80, 187, 0.1);
        color: #fff;
        font-size: 12px;
        outline: none;
      }

      .remove-btn {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: none;
        border-radius: 8px;
        padding: 0 12px;
        cursor: pointer;
        font-weight: bold;
      }

      .add-btn-wrapper {
        margin-left: 120px;
        margin-bottom: 30px;
      }

      .add-keyword-btn {
        background: rgba(34, 197, 94, 0.1);
        color: #22c55e;
        border: none;
        border-radius: 10px;
        padding: 6px 14px;
        cursor: pointer;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
      }

      /* --- BUTTON EKSEKUSI --- */
      .execute-btn {
        width: 100%;
        padding: 18px;
        background: linear-gradient(
          135deg,
          var(--primary-purple),
          var(--deep-purple)
        );
        color: #fff;
        border: none;
        border-radius: 18px;
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      }

      .execute-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(157, 80, 187, 0.4);
      }

      .hidden {
        display: none;
      }
      .footer-tag {
        margin-top: 30px;
        text-align: center;
        font-size: 8px;
        color: #475569;
        letter-spacing: 3px;
      }
    </style>
  </head>
  <body>
    <div class="minimal-panel">
      <h1>I Love Demigod <span style="font-weight: 300">V1</span></h1>

      <div class="tabs">
        <button class="tab-btn active" id="btn-s" onclick="setMode('single')">
          Single Query
        </button>
        <button class="tab-btn" id="btn-b" onclick="setMode('bulk')">
          Dynamic Bulk
        </button>
      </div>

      <div class="form-row">
        <span class="input-label">Core Engine</span>
        <select id="domain" class="input-field">
          <option value="google.com">Google Global (.com)</option>
          <option value="google.co.id">Google Indonesia (.co.id)</option>
        </select>
      </div>

      <div id="singleMode">
        <div class="form-row">
          <span class="input-label">Keyword</span>
          <input
            type="text"
            id="kwSingle"
            class="input-field"
            placeholder="Enter target..."
            autocomplete="off"
          />
        </div>
      </div>

      <div id="bulkMode" class="hidden">
        <div class="form-row" style="margin-bottom: 10px">
          <span class="input-label">Bulk List</span>
          <div style="flex: 1; font-size: 9px; color: #64748b">
            Manage your keyword registry below:
          </div>
        </div>

        <div id="bulkFormContainer">
          <div class="bulk-input-row">
            <input
              type="text"
              class="bulk-item"
              placeholder="Keyword #1..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="add-btn-wrapper">
          <button class="add-keyword-btn" onclick="addKeywordInput()">
            + Add New Row
          </button>
        </div>
      </div>

      <button class="execute-btn" onclick="launch()">
        Execute Search Matrix
      </button>

      <div class="footer-tag">DEV168@</div>
    </div>

    <script>
      let mode = "single";
      const sInput = document.getElementById("kwSingle");
      const bulkContainer = document.getElementById("bulkFormContainer");

      function setMode(m) {
        mode = m;
        document
          .getElementById("btn-s")
          .classList.toggle("active", m === "single");
        document
          .getElementById("btn-b")
          .classList.toggle("active", m === "bulk");
        document
          .getElementById("singleMode")
          .classList.toggle("hidden", m !== "single");
        document
          .getElementById("bulkMode")
          .classList.toggle("hidden", m !== "bulk");
        if (m === "single") sInput.focus();
      }

      function addKeywordInput() {
        const newRow = document.createElement("div");
        newRow.className = "bulk-input-row";
        newRow.innerHTML = `
            <input type="text" class="bulk-item" placeholder="Keyword..." autocomplete="off">
            <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
        `;
        bulkContainer.appendChild(newRow);
        newRow.querySelector("input").focus();
        bulkContainer.scrollTop = bulkContainer.scrollHeight;
      }

      function launch() {
        const domain = document.getElementById("domain").value;
        let list = [];

        if (mode === "single") {
          if (sInput.value.trim()) list.push(sInput.value.trim());
        } else {
          document.querySelectorAll(".bulk-item").forEach((input) => {
            if (input.value.trim()) list.push(input.value.trim());
          });
        }

        if (list.length === 0) return alert("Masukkan keyword!");

        list.forEach((kw, i) => {
          setTimeout(() => {
            let url = `https://${domain}/search?q=${encodeURIComponent(kw)}&gl=id&hl=id`;
            window.open(url, "_blank");
          }, i * 700);
        });
      }

      document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") launch();
      });
      window.onload = () => sInput.focus();
    </script>

</body>
</html>
